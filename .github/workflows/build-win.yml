name: Compile Aseprite Windows EXE
on:
  # 手动触发编译
  workflow_dispatch:
  # push main 分支自动编译（可选）
  push:
    branches: [ main ]

jobs:
  build-windows:
    runs-on: windows-2022
    steps:
      # 1. 加载VS编译环境 x64
      - name: Setup MSVC 2022 x64
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      # 2. 安装 CMake、Ninja、7zip
      - name: Install build tools
        run: |
          choco install cmake ninja 7zip -y
          echo "$env:ChocolateyInstall\bin" >> $env:GITHUB_PATH

      # 3. 缓存 Skia，不用每次重复下载
      - name: Cache Skia library
        uses: actions/cache@v3
        id: skia-cache
        with:
          path: skia
          key: skia-m124-win64-release

      # 4. Skia不存在则下载
      - name: Download Skia m124
        if: steps.skia-cache.outputs.cache-hit != 'true'
        run: |
          mkdir skia
          cd skia
          Invoke-WebRequest -Uri "https://release-assets.githubusercontent.com/github-production-release-asset/45053736/2f051801-712e-438f-936f-ee2e3ada99b3?sp=r&sv=2018-11-09&sr=b&spr=https&se=2026-07-08T04%3A06%3A02Z&rscd=attachment%3B+filename%3DSkia-Windows-Release-x64.zip&rsct=application%2Foctet-stream&skoid=96c2d410-5711-43a1-aedd-ab1947aa7ab0&sktid=398a6654-997b-47e9-b12b-9515b896b4de&skt=2026-07-08T03%3A05%3A13Z&ske=2026-07-08T04%3A06%3A02Z&sks=b&skv=2018-11-09&sig=itN7uDp2dYBcmeornizgdFvAfRyvHKv3CvLkU0%2FY6So%3D&jwt=eyJ0eXAiOiJKV1QiLCJhbGciOiJIUzI1NiJ9.eyJpc3MiOiJnaXRodWIuY29tIiwiYXVkIjoicmVsZWFzZS1hc3NldHMuZ2l0aHVidXNlcmNvbnRlbnQuY29tIiwia2V5Ijoia2V5MSIsImV4cCI6MTc4MzQ4MjQ2NiwibmJmIjoxNzgzNDgwNjY2LCJwYXRoIjoicmVsZWFzZWFzc2V0cHJvZHVjdGlvbi5ibG9iLmNvcmUud2luZG93cy5uZXQifQ.J_G06CSaS5PoyEwREt-xptFZYyFUs2hsbdFjkbN5inU&response-content-disposition=attachment%3B%20filename%3DSkia-Windows-Release-x64.zip&response-content-type=application%2Foctet-stream" -OutFile skia.zip
          7z x skia.zip
          Remove-Item skia.zip

      # 5. 拉取 Aseprite 完整源码（包含子模块）
      - name: Clone Aseprite source
        run: |
          git clone --recursive https://github.com/aseprite/aseprite.git
          cd aseprite
          git submodule update --init --recursive

      # 6. CMake 配置编译参数
      - name: CMake configure
        working-directory: aseprite
        run: |
          mkdir build
          cd build
          cmake `
            -G Ninja `
            -DCMAKE_BUILD_TYPE=Release `
            -DLAF_BACKEND=skia `
            -DSKIA_DIR="$env:GITHUB_WORKSPACE\skia" `
            -DSKIA_LIBRARY_DIR="$env:GITHUB_WORKSPACE\skia\out\Release-x64" `
            -DSKIA_LIBRARY="$env:GITHUB_WORKSPACE\skia\out\Release-x64\skia.lib" `
            ..

      # 7. 执行编译生成 aseprite.exe
      - name: Ninja build
        working-directory: aseprite/build
        run: ninja aseprite

      # 8. 打包绿色便携压缩包
      - name: Package portable zip
        working-directory: aseprite/build/bin
        run: |
          echo "[Options]" > aseprite.ini
          echo "UserDataPath=." >> aseprite.ini
          7z a -tzip Aseprite-Win64-Portable.zip *

      # 9. 上传编译产物，供下载
      - name: Upload compiled artifact
        uses: actions/upload-artifact@v4
        with:
          name: Aseprite-Win64-EXE-Portable
          path: aseprite/build/bin/Aseprite-Win64-Portable.zip