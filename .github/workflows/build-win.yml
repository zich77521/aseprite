name: Compile Aseprite Windows EXE
on:
  # 手动触发编译
  workflow_dispatch:
  # push main 分支自动编译（可选）
  push:
    branches: [ main ]

jobs:
  build-windows:
    runs-on: windows-2022
    steps:
      # 1. 加载VS编译环境 x64
      - name: Setup MSVC 2022 x64
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      # 2. 安装 CMake、Ninja、7zip
      - name: Install build tools
        run: |
          choco install cmake ninja 7zip -y
          echo "$env:ChocolateyInstall\bin" >> $env:GITHUB_PATH

      # 3. 缓存 Skia，不用每次重复下载
      - name: Cache Skia library
        uses: actions/cache@v3
        id: skia-cache
        with:
          path: skia
          key: skia-m124-win64-release

      # 4. Skia不存在则下载
      - name: Download Skia m124
        if: steps.skia-cache.outputs.cache-hit != 'true'
        run: |
          mkdir skia
          cd skia
          Invoke-WebRequest -Uri "https://github.com/aseprite/skia/releases/download/m124/Skia-Windows-Release-x64.zip" -OutFile skia.zip
          7z x skia.zip
          Remove-Item skia.zip

      # 5. 拉取 Aseprite 完整源码（包含子模块）
      - name: Clone Aseprite source
        run: |
          git clone --recursive https://github.com/aseprite/aseprite.git
          cd aseprite
          git submodule update --init --recursive

      # 6. CMake 配置编译参数
      - name: CMake configure
        working-directory: aseprite
        run: |
          mkdir build
          cd build
          cmake `
            -G Ninja `
            -DCMAKE_BUILD_TYPE=Release `
            -DLAF_BACKEND=skia `
            -DSKIA_DIR="$env:GITHUB_WORKSPACE\skia" `
            -DSKIA_LIBRARY_DIR="$env:GITHUB_WORKSPACE\skia\out\Release-x64" `
            -DSKIA_LIBRARY="$env:GITHUB_WORKSPACE\skia\out\Release-x64\skia.lib" `
            ..

      # 7. 执行编译生成 aseprite.exe
      - name: Ninja build
        working-directory: aseprite/build
        run: ninja aseprite

      # 8. 打包绿色便携压缩包
      - name: Package portable zip
        working-directory: aseprite/build/bin
        run: |
          echo "[Options]" > aseprite.ini
          echo "UserDataPath=." >> aseprite.ini
          7z a -tzip Aseprite-Win64-Portable.zip *

      # 9. 上传编译产物，供下载
      - name: Upload compiled artifact
        uses: actions/upload-artifact@v4
        with:
          name: Aseprite-Win64-EXE-Portable
          path: aseprite/build/bin/Aseprite-Win64-Portable.zip